<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Athaaura Events</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins, sans-serif;
  background:#0a0a0a;
  color:white;
}

header{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(0,0,0,0.7);
  position:sticky;
  top:0;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{height:50px;}

nav a{
  color:white;
  margin-left:20px;
  text-decoration:none;
}

.hero{
  height:100vh;
  background:url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622') center/cover;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{font-size:50px;}

.btn{
  padding:12px 25px;
  background:#9333ea;
  border-radius:30px;
  text-decoration:none;
  color:white;
}

.section{padding:60px 20px; text-align:center;}

.card{
  display:inline-block;
  width:250px;
  margin:15px;
  padding:20px;
  background:#1e293b;
  border-radius:10px;
}

form input, form textarea{
  width:80%;
  padding:10px;
  margin:10px;
}

footer{text-align:center; padding:20px;}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png">
    <h2>Athaaura Events</h2>
  </div>
  <nav>
    <a href="#">Home</a>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Events That Never Lose Their Charm</h1>
  <p>Luxury Event Management in Dewas</p>
  <a href="#contact" class="btn">Book Now</a>
</section>

<section id="services" class="section">
  <h2>Services</h2>
  <div class="card">Wedding Planner</div>
  <div class="card">Corporate Events</div>
  <div class="card">Birthday Events</div>
</section>

<section id="contact" class="section">
  <h2>Contact Us</h2>
  <form action="https://formspree.io/f/mjglyejn" method="POST">
    <input type="text" name="name" placeholder="Name" required><br>
    <input type="email" name="email" placeholder="Email" required><br>
    <textarea name="message" placeholder="Message"></textarea><br>
    <button class="btn">Send</button>
  </form>
</section>

<footer>
  <p>© Athaaura Events</p>
</footer>

</body>
</html>
