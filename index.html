<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Athaaura Events</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#000;
  color:#fff;
}

/* NAVBAR */
header{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(0,0,0,0.5);
}

nav a{
  margin-left:20px;
  color:white;
  text-decoration:none;
}

/* HERO VIDEO */
.hero{
  height:100vh;
  position:relative;
}

.hero video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero-content{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.hero h1{
  font-size:60px;
}

/* SECTIONS */
.section{
  padding:80px 20px;
  text-align:center;
}

.services{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.card{
  width:250px;
  padding:20px;
  background:#111;
  border-radius:10px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

/* CONTACT */
input, textarea{
  width:80%;
  padding:10px;
  margin:10px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<header>
  <h2>Athaaura Events</h2>
  <nav>
    <a href=\"#\">Home</a>
    <a href=\"#services\">Services</a>
    <a href=\"#contact\">Contact</a>
  </nav>
</header>

<section class=\"hero\">
  <video autoplay muted loop>
    <source src=\"video.mp4\" type=\"video/mp4\">
  </video>

  <div class=\"hero-content\">
    <h1>Luxury Event Experience</h1>
    <p>Events That Never Lose Their Charm</p>
  </div>
</section>

<section id=\"services\" class=\"section\">
  <h2>Our Services</h2>
  <div class=\"services\">
    <div class=\"card\">Wedding Planner</div>
    <div class=\"card\">Corporate Events</div>
    <div class=\"card\">Social Events</div>
  </div>
</section>

<section id=\"contact\" class=\"section\">
  <h2>Contact Us</h2>

  <form action=\"https://formspree.io/f/mjglyejn\" method=\"POST\">
    <input type=\"text\" name=\"name\" placeholder=\"Name\" required><br>
    <input type=\"email\" name=\"email\" placeholder=\"Email\" required><br>
    <textarea name=\"message\" placeholder=\"Message\"></textarea><br>
    <button>Send</button>
  </form>
</section>

<footer>
  <p>© Athaaura Events</p>
</footer>

</body>
</html>
