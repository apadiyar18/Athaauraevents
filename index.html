<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Athaaura Events | Luxury Event Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      color: #fff;
      background: black;
      overflow-x: hidden;
    }

    /* Animated Gradient Overlay */
    body::before {
      content: "";
      position: fixed;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 20% 20%, #0ea5e9, transparent),
                  radial-gradient(circle at 80% 80%, #9333ea, transparent);
      animation: moveBG 10s linear infinite;
      z-index: -1;
    }

    @keyframes moveBG {
      0% { transform: translate(0,0); }
      50% { transform: translate(-10%, -10%); }
      100% { transform: translate(0,0); }
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      height: 55px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 5px #38bdf8); }
      to { filter: drop-shadow(0 0 20px #9333ea); }
    }

    nav a {
      margin-left: 20px;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover { color: #38bdf8; }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622') center/cover;
    }

    .hero h2 {
      font-size: 50px;
      animation: fadeInUp 1s ease;
    }

    .hero p {
      margin: 15px 0;
      font-size: 20px;
      animation: fadeInUp 1.5s ease;
    }

    .btn {
      padding: 12px 25px;
      background: linear-gradient(45deg, #0ea5e9, #9333ea);
      border-radius: 30px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      animation: fadeInUp 2s ease;
    }

    .section {
      padding: 80px 20px;
      text-align: center;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 15px;
      width: 260px;
      margin: 15px;
      display: inline-block;
      transform: translateY(30px);
      opacity: 0;
      transition: 0.5s;
    }

    .card.show {
      transform: translateY(0);
      opacity: 1;
    }

    .card:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(147,51,234,0.5);
    }

    footer {
      padding: 20px;
      text-align: center;
      background: #000;
    }

    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      padding: 15px;
      border-radius: 50%;
      animation: bounce 2s infinite;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="logo">
    <h2>Athaaura Events</h2>
  </div>
  <nav>
    <a href="#">Home</a>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Luxury Events Experience</h2>
  <p>Events That Never Lose Their Charm</p>
  <a href="#contact" class="btn">Book Now</a>
</section>

<section id="services" class="section">
  <h2>Our Services</h2>
  <div class="card">Wedding Planner</div>
  <div class="card">Corporate Events</div>
  <div class="card">Social Events</div>
  <div class="card">Concerts & Shows</div>
</section>

<footer>
  <p>© 2026 Athaaura Events | Luxury Experience</p>
</footer>

<a href="https://wa.me/917987217601" class="whatsapp">💬</a>

<script>
  const cards = document.querySelectorAll('.card');
  window.addEventListener('scroll', () => {
    cards.forEach(card => {
      const top = card.getBoundingClientRect().top;
      if(top < window.innerHeight - 100){
        card.classList.add('show');
      }
    });
  });
</script>

</body>
</html>
